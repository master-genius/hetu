# 三平台自动打包：推送 v* 标签（或手动触发）→ 构建并上传到 GitHub Release 草稿。
# 本地无需 Rust 环境，打 tag 即可：
#   git tag v0.1.0 && git push origin v0.1.0
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write # 创建 Release 需要
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04 # Linux x64：deb / rpm / AppImage
          - platform: windows-latest # Windows x64：msi / nsis exe
          - platform: macos-latest # macOS Apple Silicon：dmg / app
          - platform: macos-13 # macOS Intel：dmg / app
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      # 加速二次构建：缓存 cargo 产物
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 安装 Linux 系统依赖
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev build-essential \
            pkg-config libssl-dev

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # 推 tag 时创建同名 Release 草稿并上传全部安装包
          tagName: ${{ github.ref_name }}
          releaseName: "SuperSSH ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
