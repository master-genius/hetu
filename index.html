<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SuperSSH</title>
  </head>
  <body>
    <div id="app">
      <header id="titlebar" data-tauri-drag-region>
        <div id="toolbar">
          <button id="btn-connect" class="tool-btn" title="新建 SSH 连接">
            <svg viewBox="0 0 16 16" width="15" height="15"><path fill="currentColor" d="M2 3h12v6.5H2V3zm1.5 1.5v3.5h9V4.5h-9zM4 11h8v1.2l2 .8v1H2v-1l2-.8V11zm1.2 1.3h1.4v1.4H5.2v-1.4z"/></svg>
          </button>
          <button id="btn-explorer" class="tool-btn" title="本地文件管理器">
            <svg viewBox="0 0 16 16" width="15" height="15"><path fill="currentColor" d="M1.5 3A1.5 1.5 0 013 1.5h3l1.5 2H13A1.5 1.5 0 0114.5 5v7A1.5 1.5 0 0113 13.5H3A1.5 1.5 0 011.5 12V3z"/></svg>
          </button>
          <button id="btn-upload" class="tool-btn" title="上传文件到当前目录">
            <svg viewBox="0 0 16 16" width="15" height="15"><path fill="currentColor" d="M8 1l4 4h-2.5v5h-3V5H4l4-4zM3 13h10v1.5H3V13z"/></svg>
          </button>
          <button id="btn-split-h" class="tool-btn" title="向右切分 (Ctrl+Alt+R)">
            <svg viewBox="0 0 16 16" width="15" height="15"><path fill="currentColor" d="M2 2h5.25v12H2V2zm6.75 0H14v12H8.75V2z"/></svg>
          </button>
          <button id="btn-split-v" class="tool-btn" title="向下切分 (Ctrl+Alt+D)">
            <svg viewBox="0 0 16 16" width="15" height="15"><path fill="currentColor" d="M2 2h12v5.25H2V2zm0 6.75h12V14H2V8.75z"/></svg>
          </button>
          <button id="btn-settings" class="tool-btn" title="设置">
            <svg viewBox="0 0 16 16" width="15" height="15"><path fill="currentColor" d="M9.4 1h-2.8l-.4 2a5.4 5.4 0 00-1.5.9L2.8 3.2 1.4 5.6l1.6 1.3a5.5 5.5 0 000 1.7L1.4 9.9l1.4 2.4 1.9-.7c.5.4 1 .7 1.5.9l.4 2h2.8l.4-2c.5-.2 1-.5 1.5-.9l1.9.7 1.4-2.4-1.6-1.3a5.5 5.5 0 000-1.7l1.6-1.3-1.4-2.4-1.9.7c-.5-.4-1-.7-1.5-.9l-.4-2zM8 5.5A2.5 2.5 0 118 10.5 2.5 2.5 0 018 5.5z"/></svg>
          </button>
        </div>
        <div id="drag-space" data-tauri-drag-region></div>
        <div id="win-controls">
          <button id="btn-min" class="win-btn" title="最小化">
            <svg viewBox="0 0 12 12" width="12" height="12"><path stroke="currentColor" stroke-width="1.2" d="M2 6h8"/></svg>
          </button>
          <button id="btn-max" class="win-btn" title="最大化/还原">
            <svg viewBox="0 0 12 12" width="12" height="12"><rect x="2.5" y="2.5" width="7" height="7" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
          </button>
          <button id="btn-close" class="win-btn close" title="关闭">
            <svg viewBox="0 0 12 12" width="12" height="12"><path stroke="currentColor" stroke-width="1.2" d="M2.5 2.5l7 7M9.5 2.5l-7 7"/></svg>
          </button>
        </div>
      </header>
      <nav id="tab-bar"></nav>
      <main id="content-wrap">
        <div id="content"></div>
        <aside id="explorer-panel" style="display:none"></aside>
      </main>
      <div id="drop-overlay" style="display:none"><span>释放以上传到当前目录</span></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
