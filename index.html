<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HetuShell</title>
  </head>
  <body>
    <div id="app">
      <!-- 玻璃面层：盖在光晕内容层之上的"玻璃本体"（backdrop-filter 真模糊 + 主题色奶膜） -->
      <div id="glass-veil" aria-hidden="true"></div>
      <header id="titlebar" data-tauri-drag-region>
        <div id="toolbar">
          <button id="btn-newtab" class="tool-btn" title="新建标签页 (Ctrl+Shift+T)">
            <svg viewBox="0 0 16 16" width="15" height="15"><path fill="currentColor" d="M8 3.2c.4 0 .7.3.7.7v3.4h3.4a.7.7 0 010 1.4H8.7v3.4a.7.7 0 01-1.4 0V8.7H3.9a.7.7 0 010-1.4h3.4V3.9c0-.4.3-.7.7-.7z"/></svg>
          </button>
          <button id="btn-connect" class="tool-btn" title="新建 SSH 连接">
            <svg viewBox="0 0 16 16" width="15" height="15"><path fill="currentColor" d="M2 3h12v6.5H2V3zm1.5 1.5v3.5h9V4.5h-9zM4 11h8v1.2l2 .8v1H2v-1l2-.8V11zm1.2 1.3h1.4v1.4H5.2v-1.4z"/></svg>
          </button>
          <button id="btn-remote" class="tool-btn disabled" title="远程文件管理器（当前终端已连接时可用）">
            <svg viewBox="0 0 20 20" width="16" height="16" fill="none"><path d="M2.5 6A1.5 1.5 0 014 4.5h3.4L9 6.2h5A1.5 1.5 0 0115.5 7.7V14A1.5 1.5 0 0114 15.5H4A1.5 1.5 0 012.5 14V6z" fill="currentColor" opacity="0.9"/><circle cx="14.5" cy="12.4" r="3.1" fill="var(--bg, #1b1e26)" stroke="currentColor" stroke-width="1.1"/><path d="M14.5 10.8v3.2M12.9 12.4h3.2" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>
          </button>
          <button id="btn-explorer" class="tool-btn" title="本地文件管理器">
            <svg viewBox="0 0 20 20" width="16" height="16" fill="none"><path d="M2.5 6A1.5 1.5 0 014 4.5h3.4L9 6.2h5A1.5 1.5 0 0115.5 7.7V14A1.5 1.5 0 0114 15.5H4A1.5 1.5 0 012.5 14V6z" fill="currentColor" opacity="0.9"/></svg>
          </button>
          <button id="btn-upload" class="tool-btn" title="上传文件到当前目录">
            <svg viewBox="0 0 16 16" width="15" height="15"><path fill="currentColor" d="M8 1l4 4h-2.5v5h-3V5H4l4-4zM3 13h10v1.5H3V13z"/></svg>
          </button>
          <button id="btn-split-h" class="tool-btn" title="向右切分 (Ctrl+Alt+R)">
            <svg viewBox="0 0 16 16" width="15" height="15"><path fill="currentColor" d="M2 2h5.25v12H2V2zm6.75 0H14v12H8.75V2z"/></svg>
          </button>
          <button id="btn-split-v" class="tool-btn" title="向下切分 (Ctrl+Alt+D)">
            <svg viewBox="0 0 16 16" width="15" height="15"><path fill="currentColor" d="M2 2h12v5.25H2V2zm0 6.75h12V14H2V8.75z"/></svg>
          </button>
          <button id="btn-identify" class="tool-btn" title="标识连接（各终端显示连接名与地址）">
            <svg viewBox="0 0 16 16" width="15" height="15"><path fill="currentColor" d="M8 1a7 7 0 100 14A7 7 0 008 1zm0 3a1.1 1.1 0 110 2.2A1.1 1.1 0 018 4zM6.8 7.2h2.1v4.3h1v1.3H6.4v-1.3h1.1V8.5H6.8V7.2z"/></svg>
          </button>
          <button id="btn-settings" class="tool-btn" title="设置">
            <svg viewBox="0 0 16 16" width="15" height="15"><path fill="currentColor" d="M9.4 1h-2.8l-.4 2a5.4 5.4 0 00-1.5.9L2.8 3.2 1.4 5.6l1.6 1.3a5.5 5.5 0 000 1.7L1.4 9.9l1.4 2.4 1.9-.7c.5.4 1 .7 1.5.9l.4 2h2.8l.4-2c.5-.2 1-.5 1.5-.9l1.9.7 1.4-2.4-1.6-1.3a5.5 5.5 0 000-1.7l1.6-1.3-1.4-2.4-1.9.7c-.5-.4-1-.7-1.5-.9l-.4-2zM8 5.5A2.5 2.5 0 118 10.5 2.5 2.5 0 018 5.5z"/></svg>
          </button>
          <button id="btn-transfers" class="tool-btn hidden" title="传输列表">
            <svg viewBox="0 0 16 16" width="15" height="15"><path fill="currentColor" d="M8 1.5c.4 0 .7.3.7.7v6.3l2-2a.7.7 0 011 1l-3.2 3.2a.7.7 0 01-1 0L4.3 7.5a.7.7 0 011-1l2 2V2.2c0-.4.3-.7.7-.7zM3 13h10v1.4H3V13z"/></svg>
          </button>
        </div>
        <div id="drag-space" data-tauri-drag-region></div>
        <div id="win-controls">
          <button id="btn-about" class="win-btn" title="关于 HetuShell">
            <svg viewBox="0 0 12 12" width="12" height="12"><circle cx="6" cy="6" r="4.6" fill="none" stroke="currentColor" stroke-width="1.1"/><path fill="currentColor" d="M6.05 3.1c.98 0 1.7.58 1.7 1.4 0 .6-.3.95-.85 1.3-.42.27-.55.44-.55.83v.22h-.95v-.3c0-.62.25-.95.8-1.3.4-.26.55-.45.55-.72 0-.33-.3-.55-.72-.55-.45 0-.75.25-.78.65h-.98c.03-.9.78-1.53 1.78-1.53zM5.4 7.6h1.1v1.05H5.4V7.6z"/></svg>
          </button>
          <button id="btn-min" class="win-btn" title="最小化">
            <svg viewBox="0 0 12 12" width="12" height="12"><path stroke="currentColor" stroke-width="1.2" d="M2 6h8"/></svg>
          </button>
          <button id="btn-max" class="win-btn" title="最大化/还原">
            <svg viewBox="0 0 12 12" width="12" height="12"><rect x="2.5" y="2.5" width="7" height="7" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
          </button>
          <button id="btn-close" class="win-btn close" title="关闭">
            <svg viewBox="0 0 12 12" width="12" height="12"><path stroke="currentColor" stroke-width="1.2" d="M2.5 2.5l7 7M9.5 2.5l-7 7"/></svg>
          </button>
        </div>
      </header>
      <nav id="tab-bar"></nav>
      <main id="content-wrap">
        <aside id="remote-panel"></aside>
        <div id="content"></div>
        <aside id="explorer-panel"></aside>
      </main>
      <div id="drop-overlay" style="display:none"><span>释放以上传到当前目录</span></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
